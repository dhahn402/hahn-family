<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  body{margin:0}
  .og{width:1200px;height:630px;background:radial-gradient(800px 400px at 50% -10%,rgba(201,162,75,.22),transparent),#0f1b2e;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;color:#fff;box-sizing:border-box;text-align:center;border:14px solid #16263f}
  .crest{width:90px;height:90px;border:3px solid #c9a24b;border-radius:50%;display:grid;place-items:center;font-size:52px;font-weight:700;color:#c9a24b;margin-bottom:20px}
  .eyebrow{color:#c9a24b;letter-spacing:.3em;text-transform:uppercase;font-family:sans-serif;font-size:18px;font-weight:600}
  h1{font-size:78px;font-weight:700;margin:8px 0}
  .g{color:#c9a24b}
  .verse{font-family:'Great Vibes',cursive;color:#e0c079;font-size:38px;margin-top:16px}
</style></head>
<body><div class="og">
  <div class="crest">H</div>
  <div class="eyebrow">Faith &middot; Family &middot; Enterprise</div>
  <h1>The Hahn Family <span class="g">of Companies</span></h1>
  <div class="verse">To God be the glory.</div>
</div></body></html>
